name: Python Tests

on:
  pull_request:
    branches:
      - dev
  workflow_dispatch:

env:
  DJANGO_SETTINGS_MODULE: core.settings

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Use test config
        run: cp configs.example.py configs.py

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: python manage.py test hexoweb --verbosity=2
